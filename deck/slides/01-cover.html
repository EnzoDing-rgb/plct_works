<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>01 · 封面</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    background: #0a0e1a;
    font-family: "Noto Serif SC", "PingFang SC", serif;
    color: #f1f5f9;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(240,180,41,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,180,41,0.03) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 45%, black 30%, transparent 70%);
  }
  .accent-line {
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #f0b429, #f59e0b, #d97706, #f0b429);
  }
  .content { position: relative; text-align: center; z-index: 2; }
  .kicker {
    font-size: 18px; letter-spacing: 0.28em; text-transform: uppercase;
    color: #f0b429; margin-bottom: 40px; font-family: system-ui, sans-serif;
  }
  h1 {
    font-size: 96px; font-weight: 900; line-height: 1.25;
    letter-spacing: 0.04em; margin-bottom: 24px;
  }
  h1 .gold { color: #f0b429; }
  .subtitle {
    font-size: 32px; color: #94a3b8; font-weight: 400;
    letter-spacing: 0.06em; margin-bottom: 60px;
  }
  .meta {
    display: flex; gap: 48px; justify-content: center;
    font-size: 20px; color: #64748b; font-family: system-ui, sans-serif;
  }
  .meta span { display: flex; align-items: center; gap: 10px; }
  .meta .dot { width: 6px; height: 6px; border-radius: 50%; background: #f0b429; display: inline-block; }
  .corner-badge {
    position: absolute; bottom: 60px; right: 80px;
    font-size: 15px; color: #475569; letter-spacing: 0.12em;
    font-family: system-ui, sans-serif;
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="accent-line"></div>
<div class="content">
  <div class="kicker">PLCT Lab · Internship Report</div>
  <h1>RISC-V 嵌入式与<br><span class="gold">全栈开发</span>实习总结</h1>
  <div class="subtitle">丁冯德 · 2026 年 3 月 – 6 月</div>
  <div class="meta">
    <span><span class="dot"></span>Mentor: 张馥媛</span>
    <span><span class="dot"></span>PLCT 实验室</span>
  </div>
</div>
<div class="corner-badge">RUYISDK · RISC-V</div>
</body>
</html>
